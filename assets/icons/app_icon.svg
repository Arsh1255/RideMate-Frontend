<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00BFFF" />
      <stop offset="100%" stop-color="#39D35F" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.15" />
    </filter>
  </defs>
  
  <!-- App Icon Background -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />
  
  <!-- Subtle inner overlay for depth -->
  <rect width="512" height="512" rx="112" fill="white" opacity="0.05" />
  
  <!-- Symbol: Stylized "R" with Leaf Loop -->
  <g filter="url(#shadow)">
    <!-- Main stem of R -->
    <path d="M160 120 L 160 392" stroke="white" stroke-width="60" stroke-linecap="round" />
    
    <!-- Leaf Loop of R -->
    <path d="M160 150 C 260 150, 340 180, 340 250 C 340 320, 260 350, 160 350" fill="none" stroke="white" stroke-width="60" stroke-linecap="round" />
    
    <!-- Leg of R -->
    <path d="M220 320 L 320 392" stroke="white" stroke-width="60" stroke-linecap="round" />
    
    <!-- Leaf shape inside loop -->
    <path d="M 190 250 C 190 210, 230 190, 270 210 C 270 250, 230 290, 190 250 Z" fill="white" />
    
    <!-- Leaf vein -->
    <path d="M 190 250 L 250 220" stroke="url(#bgGrad)" stroke-width="6" stroke-linecap="round" />
  </g>
</svg>
