<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00BFFF" />
      <stop offset="100%" stop-color="#39D35F" />
    </linearGradient>
    <filter id="logoShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.1" />
    </filter>
  </defs>
  
  <g transform="translate(0, -30)">
    <!-- Symbol -->
    <g transform="translate(196, 60) scale(0.6)" filter="url(#logoShadow)">
      <!-- Main stem of R -->
      <path d="M160 120 V 392" stroke="url(#logoGrad)" stroke-width="40" stroke-linecap="round" />
      
      <!-- Leaf Loop of R -->
      <path d="M160 120 C 240 120, 320 160, 320 240 C 320 320, 240 360, 160 360" fill="none" stroke="url(#logoGrad)" stroke-width="40" stroke-linecap="round" />
      
      <!-- Leg of R -->
      <path d="M220 320 L 320 392" stroke="url(#logoGrad)" stroke-width="40" stroke-linecap="round" />
      
      <!-- Leaf detail -->
      <path d="M220 200 C 260 200, 280 220, 280 240 C 280 260, 260 280, 220 280 Z" fill="url(#logoGrad)" opacity="0.8" />
    </g>
    
    <!-- Text: RideMate -->
    <text x="256" y="360" text-anchor="middle" font-family="'Outfit', 'Inter', sans-serif" font-weight="800" font-size="56" fill="white" letter-spacing="2">RideMate</text>
    
    <!-- Tagline -->
    <text x="256" y="410" text-anchor="middle" font-family="'Outfit', 'Inter', sans-serif" font-weight="500" font-size="20" fill="#A0A0A0" letter-spacing="4">FIND YOUR RIDE BUDDY</text>
  </g>
</svg>
